<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PlacementsPortal" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/images/logo.png" />
    
    <!-- Primary Meta Tags -->
    <title>PlacementsPortal - Graduate Jobs, Internships & Career Opportunities UK</title>
    <meta name="title" content="PlacementsPortal - Graduate Jobs, Internships & Career Opportunities UK" />
    <meta name="description" content="Find 2,500+ graduate jobs, internships, and placement opportunities in Engineering, IT, and Consultancy. Free CV reviews, career coaching, and direct employer connections for UK graduates." />
    <meta name="keywords" content="graduate jobs uk, internships uk, placement opportunities, engineering jobs, it jobs, career portal, cv review, career coaching, job search, graduate recruitment" />
    <meta name="author" content="PlacementsPortal" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://placementsportal.com" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://placementsportal.com/" />
    <meta property="og:title" content="PlacementsPortal - Graduate Jobs & Career Opportunities" />
    <meta property="og:description" content="Access 2,500+ graduate jobs, internships, and placements. Free CV reviews and career coaching for UK graduates." />
    <meta property="og:image" content="https://placementsportal.com/images/logo.png" />
    <meta property="og:site_name" content="PlacementsPortal" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://placementsportal.com/" />
    <meta property="twitter:title" content="PlacementsPortal - Graduate Jobs & Career Opportunities" />
    <meta property="twitter:description" content="Access 2,500+ graduate jobs, internships, and placements. Free CV reviews and career coaching for UK graduates." />
    <meta property="twitter:image" content="https://placementsportal.com/images/logo.png" />
    
    <!-- Structured Data / Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "PlacementsPortal",
      "url": "https://placementsportal.com",
      "description": "Graduate jobs, internships, and career opportunities platform",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://placementsportal.com/opportunities?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
